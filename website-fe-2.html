# Buổi 4: Logic Đăng Nhập & Phân Quyền (JavaScript)

> **💡 Lời dẫn giảng:** "Phần 'não bộ' đây rồi. Vì chúng ta không có máy chủ thật (Backend), chúng ta sẽ dùng bộ nhớ của trình duyệt (LocalStorage) làm Database. Nếu sai tài khoản, chặn không cho vào. Nếu là Admin, mở cửa cho vào trang quản trị."

## 1. Xử lý Đăng Ký & Đăng Nhập (File login.js)
*(Đáp ứng yêu cầu: Phân quyền giữa ng dùng và admin, lưu file JS)*

~~~javascript
// ĐĂNG KÝ
function handleRegister() {
    let u = document.getElementById("regUsername").value;
    let p = document.getElementById("regPassword").value;
    
    // Đọc data cũ, nếu chưa có thì tạo mảng []
    let users = JSON.parse(localStorage.getItem("usersDB")) || [];
    
    // Push tk mới vào (mặc định role là user)
    users.push({ username: u, password: p, role: "user" }); 
    localStorage.setItem("usersDB", JSON.stringify(users));
    
    alert("Đăng ký thành công!");
}

// ĐĂNG NHẬP
function handleLogin() {
    let u = document.getElementById("loginUsername").value;
    let p = document.getElementById("loginPassword").value;
    
    // 1. Hardcode tài khoản Admin (Mẹo qua môn)
    if(u === "admin" && p === "admin123") {
        localStorage.setItem("currentUser", JSON.stringify({username: u, role: "admin"}));
        window.location.href = "admin.html"; // Chuyển hướng
        return;
    }

    // 2. Kiểm tra tài khoản khách hàng
    let users = JSON.parse(localStorage.getItem("usersDB")) || [];
    let validUser = users.find(x => x.username === u && x.password === p);
    
    if(validUser) {
        localStorage.setItem("currentUser", JSON.stringify(validUser));
        window.location.href = "index.html"; // Chuyển ra trang mua sắm
    } else {
        alert("Sai tài khoản hoặc mật khẩu!");
    }
}
~~~

## 2. Code bảo vệ trang Admin
Ở ĐẦU file `<script>` của trang `admin.html`, hãy viết đoạn này để chặn người dùng thường:

# Buổi 5: Giỏ hàng, OTP Gmail & Lịch sử Giao dịch

> **💡 Lời dẫn giảng:** "Buổi cuối cùng, chúng ta xử lý nốt khâu thanh toán. Đặc biệt, thầy sẽ dạy các em 1 'Cheat Code' để giả lập chức năng gửi OTP Gmail mà không cần phải viết code Backend phức tạp."

## 1. Tích chọn sản phẩm trong giỏ hàng
*(Đáp ứng yêu cầu đồ án: Lưu vào giỏ hàng, có khả năng tích SP đã lưu)*

Khi hiển thị giỏ hàng trên trang `cart.html`, nhớ chèn thêm checkbox:

~~~html
<!-- Mẫu HTML 1 dòng giỏ hàng sinh ra bởi JS -->
<div class="cart-item">
    <input type="checkbox" class="cart-checkbox" data-price="150000" onchange="calculateTotal()">
    <span>Áo Thun Trắng</span>
    <span>150.000đ</span>
</div>
~~~

~~~javascript
// JS Tính tiền theo checkbox
function calculateTotal() {
    let total = 0;
    let boxes = document.querySelectorAll('.cart-checkbox');
    boxes.forEach(box => {
        if(box.checked) {
            total += parseInt(box.getAttribute('data-price'));
        }
    });
    document.getElementById("totalPrice").innerText = total;
}
~~~

## 2. Thanh toán & Lịch sử giao dịch
*(Đáp ứng yêu cầu: Lịch sử giao dịch)*

Khi bấm "Thanh Toán", ta đẩy dữ liệu vào `orderHistory`:
~~~javascript
function checkout() {
    let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
    let currentCart = JSON.parse(localStorage.getItem("cart"));
    
    let newOrder = {
        orderId: "DH" + Math.floor(Math.random() * 1000), // Tạo mã đơn ngẫu nhiên
        date: new Date().toLocaleString(), // Lấy ngày giờ hiện tại
        items: currentCart
    };
    
    history.push(newOrder);
    localStorage.setItem("orderHistory", JSON.stringify(history));
    
    // Xóa giỏ hàng sau khi thanh toán
    localStorage.removeItem("cart"); 
    alert("Thanh toán thành công! Hãy xem trong mục Lịch sử.");
}
~~~

## 3. Giả lập OTP Gmail (Cheat Code qua môn)
*(Đáp ứng yêu cầu: Xác thực 2 bước, Quên pass gửi OTP)*

> **GV Giải thích cho HS:** Gửi Email thật cần có máy chủ NodeJS. Ở Frontend, ta dùng `alert` và `prompt` để mô phỏng luồng (Flow) nhằm chấm điểm tư duy.

~~~javascript
// Đặt vào trang login.html (Chức năng quên mật khẩu)
function forgotPassword() {
    let email = prompt("Vui lòng nhập Gmail của bạn để nhận mã OTP:");
    if(email) {
        // Sinh ra mã 4 số ngẫu nhiên
        let fakeOTP = Math.floor(1000 + Math.random() * 9000); 
        
        // BƯỚC GIẢ LẬP GMAIL:
        alert(`[THÔNG BÁO TỪ GMAIL] Hệ thống đã gửi mã OTP là: ${ fakeOTP } tới hòm thư ${ email }`);
        
        // Mở popup xác thực
        let userOTP = prompt("Vui lòng kiểm tra Gmail và nhập mã OTP vào đây:");
        
        if(userOTP == fakeOTP) {
            let newPass = prompt("✅ Xác thực thành công! Nhập mật khẩu mới của bạn:");
            alert("Đã đổi mật khẩu. Vui lòng đăng nhập lại!");
            // (Thực tế sẽ update mảng Users trong LocalStorage)
        } else {
            alert("❌ Mã OTP không đúng!");
        }
    }
}
~~~

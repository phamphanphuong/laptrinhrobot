function addToCart(productId) {
    const user = JSON.parse(localStorage.getItem('CURRENT_USER'));
    if (!user) return alert('Phải đăng nhập mới được mua áo!');

    // Tạo khóa riêng cho từng user
    const cartKey = 'CART_' + user.username;
    
    // Lấy giỏ hàng cũ ra (Nếu chưa có thì tạo mảng rỗng)
    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
    
    // Yêu cầu nhập nội dung muốn in lên áo
    const customText = prompt('Nhập chữ bạn muốn in lên áo (Bỏ trống nếu không in):') || 'Không có';

    // Kiểm tra áo đã có trong giỏ chưa
    let existingItem = cart.find(x => x.id === productId && x.printText === customText);
    
    if (existingItem) {
        existingItem.qty += 1;
    } else {
        cart.push({ id: productId, qty: 1, printText: customText });
    }

    // Cất lại vào LocalStorage
    localStorage.setItem(cartKey, JSON.stringify(cart));
    alert('Đã thêm vào giỏ hàng!');
}
                    </code></pre>

                    <h3 class="text-xl font-bold text-green-700 mb-2"><i class="fa-solid fa-laptop-code"></i> Thực hành: Nút Thanh Toán</h3>
                    <pre><code class="language-javascript">
function checkout() {
    const user = JSON.parse(localStorage.getItem('CURRENT_USER'));
    const cartKey = 'CART_' + user.username;
    const cart = JSON.parse(localStorage.getItem(cartKey));
    
    if(!cart || cart.length === 0) return alert('Giỏ hàng rỗng!');

    // Lấy dữ liệu sản phẩm để tính tổng tiền
    const products = JSON.parse(localStorage.getItem('DB_PRODUCTS'));
    let totalAmt = 0;
    
    let orderDetail = cart.map(item => {
        let p = products.find(x => x.id === item.id);
        totalAmt += p.price * item.qty;
        return p.name + ' (In: ' + item.printText + ') x' + item.qty;
    });

    const newOrder = {
        orderId: 'ORD-' + Date.now(), // Mã đơn ngẫu nhiên theo thời gian
        username: user.username,
        date: new Date().toLocaleDateString('vi-VN'),
        items: orderDetail.join(' | '),
        total: totalAmt,
        status: 'Chờ in ấn'
    };

    // Lưu vào hệ thống
    const orders = JSON.parse(localStorage.getItem('DB_ORDERS'));
    orders.push(newOrder);
    localStorage.setItem('DB_ORDERS', JSON.stringify(orders));

    // Xóa giỏ hàng
    localStorage.removeItem(cartKey);
    alert('Đặt in áo thành công! Vào lịch sử để xem.');
}

        const contentContainer = document.getElementById('content-container');

        function renderApp() {
            // Render menu
            menuContainer.innerHTML = lessons.map(l => `
                <button class="lesson-btn w-full text-left px-6 py-4 border-b font-medium focus:outline-none flex items-center justify-between group ${l.id === 1 ? 'active' : ''}" 
                        onclick="selectLesson(${l.id}, this)">
                    <span><span class="text-xs text-gray-500 group-hover:text-gray-600 block mb-1">Buổi ${l.id}</span> ${l.title}</span>
                    <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                </button>
            `).join('');

            // Render contents
            contentContainer.innerHTML = lessons.map(l => `
                <div id="content-${l.id}" class="lesson-content bg-white p-8 rounded-xl shadow-sm border border-gray-100 ${l.id === 1 ? 'active' : ''}">
                    <div class="mb-8 border-b pb-4">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full tracking-wide">BUỔI ${l.id} / 10</span>
                        <h2 class="text-3xl font-extrabold text-gray-900 mt-3">${l.title}</h2>
                    </div>
                    
                    <div class="space-y-8">
                        <section class="prose max-w-none">
                            ${l.theory}
                        </section>
                        
                        <section>
                            ${l.practice}
                        </section>
                    </div>
                </div>
            `).join('');

            // Cập nhật Highlight cho code sau khi render HTML
            Prism.highlightAll();
        }

        // Logic chuyển tab
        window.selectLesson = function (id, btnElement) {
            // Update button styles
            document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            // Update content display
            document.querySelectorAll('.lesson-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`content-${id}`).classList.add('active');

            // Scroll to top
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderApp();
    </script>
